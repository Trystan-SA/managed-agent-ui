<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>

  <!-- Three wide branches meeting at center -->
  <line x1="256" y1="256" x2="256" y2="90" stroke="white" stroke-width="28" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="112" y2="390" stroke="white" stroke-width="28" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="400" y2="390" stroke="white" stroke-width="28" stroke-linecap="round"/>

  <!-- Dots at ends -->
  <circle cx="256" cy="90" r="40" fill="white"/>
  <circle cx="112" cy="390" r="40" fill="white"/>
  <circle cx="400" cy="390" r="40" fill="white"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="44" fill="white"/>
</svg>
